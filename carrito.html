<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXCORE — Terminal de Pago</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg-body: #05080f; --bg-card: #0c1120; --surface-img: #111827;
            --border: #1e2d4a; --accent: #00e5ff; --accent-purple: #7b2fff;
            --accent-red: #ff4d6d; --text-main: #e8edf5; --text-muted: #7a8aaa;
            --glow-cian: 0 0 15px rgba(0,229,255,0.4);
            --font-titles: 'Orbitron', sans-serif; --font-body: 'DM Sans', sans-serif;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: var(--font-body); padding: 2rem; min-height: 100vh; }
        body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,229,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,0.02) 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; z-index: 0; }
        .cart-container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 350px; gap: 2rem; position: relative; z-index: 1; }
        @media (max-width: 900px) { .cart-container { grid-template-columns: 1fr; } }
        .section-title { font-family: var(--font-titles); font-size: 1.8rem; margin-bottom: 2rem; border-left: 4px solid var(--accent); padding-left: 1rem; }
        .cart-items { display: flex; flex-direction: column; gap: 1rem; }
        .cart-item { background: var(--bg-card); border: 1px solid var(--border); padding: 1rem; display: flex; align-items: center; gap: 1.5rem; border-radius: 4px; transition: opacity 0.3s, transform 0.3s; }
        .item-img-box { width: 100px; height: 100px; background: var(--surface-img); display: flex; justify-content: center; align-items: center; border-radius: 4px; flex-shrink: 0; }
        .item-img-box img { max-width: 80%; max-height: 80%; object-fit: contain; filter: drop-shadow(0 0 5px var(--accent)); }
        .item-img-placeholder { font-size: 2rem; opacity: 0.5; }
        .item-info { flex: 1; }
        .item-cat { font-size: 0.7rem; color: var(--accent); text-transform: uppercase; display: block; margin-bottom: 0.3rem; }
        .item-name { font-family: var(--font-titles); font-size: 0.9rem; margin-bottom: 0.3rem; }
        .item-price { font-family: var(--font-titles); color: var(--accent); font-weight: 700; }
        .btn-remove { background: transparent; color: var(--accent-red); border: 1px solid var(--accent-red); padding: 0.4rem 0.8rem; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; border-radius: 2px; transition: 0.2s; flex-shrink: 0; }
        .btn-remove:hover { background: var(--accent-red); color: white; }
        .cart-summary { background: var(--bg-card); border: 1px solid var(--accent-purple); padding: 2rem; border-radius: 4px; height: fit-content; position: sticky; top: 2rem; }
        .summary-title { font-family: var(--font-titles); font-size: 1.2rem; margin-bottom: 1.5rem; color: var(--accent-purple); text-align: center; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 1rem; font-size: 0.9rem; color: var(--text-muted); }
        .summary-total { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-family: var(--font-titles); font-size: 1.3rem; color: var(--accent); }
        .btn-checkout { width: 100%; background: var(--accent-purple); color: white; border: none; padding: 1rem; font-family: var(--font-titles); font-weight: 700; text-transform: uppercase; margin-top: 2rem; cursor: pointer; box-shadow: 0 0 15px rgba(123,47,255,0.3); transition: 0.3s; border-radius: 2px; }
        .btn-checkout:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(123,47,255,0.5); }
        .btn-clear { width: 100%; background: transparent; color: var(--accent-red); border: 1px solid var(--accent-red); padding: 0.6rem; font-family: var(--font-titles); font-weight: 700; font-size: 0.65rem; text-transform: uppercase; margin-top: 0.8rem; cursor: pointer; border-radius: 2px; transition: 0.2s; }
        .btn-clear:hover { background: var(--accent-red); color: white; }
        .empty-msg { text-align: center; padding: 4rem 2rem; color: var(--text-muted); border: 1px dashed var(--border); border-radius: 4px; }
        .empty-msg span { font-size: 2.5rem; display: block; margin-bottom: 1rem; }
        .item-count-badge { display: inline-block; background: var(--accent-purple); color: white; font-size: 0.6rem; font-weight: 800; padding: 2px 7px; border-radius: 10px; margin-left: 8px; vertical-align: middle; }
    </style>
</head>
<body>
    <div class="cart-container">
        <div class="main-cart">
            <h2 class="section-title">Tu Carrito <span style="color:var(--accent)">[Terminal]</span> <span class="item-count-badge" id="item-count">0</span></h2>
            <div class="cart-items" id="cart-list"></div>
        </div>
        <div class="cart-summary">
            <h3 class="summary-title">Resumen de Orden</h3>
            <div class="summary-row"><span>Subtotal</span><span id="subtotal">$0</span></div>
            <div class="summary-row"><span>Envío (Nacional)</span><span>¡Gratis!</span></div>
            <div class="summary-row"><span>Impuestos (IVA)</span><span>Incluido</span></div>
            <div class="summary-total"><span>TOTAL</span><span id="total-final">$0</span></div>
            <button class="btn-checkout">Proceder al Pago →</button>
            <button class="btn-clear" onclick="clearCart()">Vaciar carrito</button>
            <p style="font-size:0.6rem;color:var(--text-muted);text-align:center;margin-top:1rem;">Seguridad Encriptada NEX-SHIELD 2.0</p>
        </div>
    </div>
    <script>
        const CART_KEY = 'nexcore_cart';
        function getCart() { try { return JSON.parse(localStorage.getItem(CART_KEY)) || []; } catch { return []; } }
        function saveCart(c) { localStorage.setItem(CART_KEY, JSON.stringify(c)); }
        function formatPrice(n) { return new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',minimumFractionDigits:0}).format(n); }
        function renderCart() {
            const cart = getCart();
            document.getElementById('item-count').textContent = cart.length;
            const listEl = document.getElementById('cart-list');
            if (cart.length === 0) {
                listEl.innerHTML = '<div class="empty-msg"><span>🛒</span><p>Tu terminal está vacía.</p><p style="font-size:0.8rem;margin-top:0.5rem">Agrega productos desde las secciones de la tienda.</p></div>';
                updateTotals(0); return;
            }
            listEl.innerHTML = cart.map((item, i) => `
                <div class="cart-item" id="item-${i}">
                    <div class="item-img-box">
                        ${item.img ? `<img src="${item.img}" alt="${item.name}" onerror="this.style.display='none'">` : `<span class="item-img-placeholder">📦</span>`}
                    </div>
                    <div class="item-info">
                        <span class="item-cat">${item.category}</span>
                        <h3 class="item-name">${item.name}</h3>
                        <span class="item-price">${formatPrice(item.price)}</span>
                    </div>
                    <button class="btn-remove" onclick="removeItem(${i})">Eliminar</button>
                </div>`).join('');
            updateTotals(cart.reduce((s, item) => s + item.price, 0));
        }
        function updateTotals(total) {
            const f = formatPrice(total);
            document.getElementById('subtotal').textContent = f;
            document.getElementById('total-final').textContent = f;
        }
        function removeItem(i) {
            const el = document.getElementById('item-'+i);
            if (el) { el.style.opacity='0'; el.style.transform='translateX(-20px)'; }
            setTimeout(() => { const c=getCart(); c.splice(i,1); saveCart(c); renderCart(); }, 300);
        }
        function clearCart() { if(confirm('¿Vaciar todo el carrito?')) { saveCart([]); renderCart(); } }
        renderCart();
        window.addEventListener('storage', e => { if(e.key===CART_KEY) renderCart(); });
    </script>
</body>
</html>
