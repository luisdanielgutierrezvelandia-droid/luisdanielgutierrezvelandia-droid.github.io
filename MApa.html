<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEXCORE | Ubicación</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #05080f;
      --surface: #0c1120;
      --border: #1e2d4a;
      --accent: #00e5ff;
      --accent2: #7b2fff;
      --text: #e8edf5;
      --muted: #7a8aaa;
      --glow: 0 0 20px rgba(0,229,255,0.3);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Fondo de cuadrícula igual a la principal */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .map-header {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-bottom: 2rem;
    }

    .map-header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-shadow: var(--glow);
      text-transform: uppercase;
    }

    .map-header p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }

    .map-container {
      position: relative;
      z-index: 1;
      width: 90%;
      max-width: 1000px;
      height: 60vh;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px;
      box-shadow: 0 0 40px rgba(0, 229, 255, 0.1);
      transition: border-color 0.3s;
    }

    .map-container:hover {
      border-color: var(--accent2);
    }

    iframe {
      width: 100%;
      height: 100%;
      border-radius: 2px;
      filter: grayscale(1) invert(0.9) contrast(1.2); /* Efecto visual tipo "Dark Mode" */
    }

    .back-btn {
      position: relative;
      z-index: 1;
      margin-top: 2rem;
      text-decoration: none;
      color: var(--muted);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.8rem 1.5rem;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }

    .back-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(0, 229, 255, 0.05);
    }
  </style>
</head>
<body>

  <div class="map-header">
    <h1>Nuestra Sede</h1>
    <p>Visítanos y conoce lo último en tecnología de alto rendimiento</p>
  </div>

  <div class="map-container">
   <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d9464.558416159178!2d-73.63240622782008!3d4.150086112546961!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8e3e2de5e7626a37%3A0x50025387e3f137a2!2sParque%20Del%20Hacha!5e0!3m2!1ses!2sco!4v1776533874458!5m2!1ses!2sco" 
   width="600" 
   height="450" 
   style="border:0;" 
   allowfullscreen="" 
   loading="lazy" 
   referrerpolicy="no-referrer-when-downgrade">
  </iframe>
  </div>

  <a href="hardware_store (1).html" class="back-btn">← Volver a la tienda</a>

</body>
</html>
